services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "4001:4001"
      - "5001:5001"  # MCP server (OpenClaw, IronClaw, etc.)
    environment:
      # SQLite lives on the dbdata volume so it survives `docker compose down`.
      SQLITE_DB_PATH: /data/pantry.db
      AI_API_KEY: ${AI_API_KEY:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
      ENABLE_MCP: ${ENABLE_MCP:-false}
      # Raspberry Pi: uncomment to skip image variant generation, save disk/CPU
      # ENABLE_IMAGE_PROCESSING: "false"
    volumes:
      - dbdata:/data
      - uploads:/app/packages/app/public/uploads

volumes:
  dbdata:
  uploads:
