services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pantry_host
      POSTGRES_USER: recipes
      POSTGRES_PASSWORD: recipes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-init.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipes -d pantry_host"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      DATABASE_URL: postgres://recipes:recipes@db:5432/pantry_host
      AI_API_KEY: ${AI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/packages/app/public/uploads

volumes:
  pgdata:
  uploads:
