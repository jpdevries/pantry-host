services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pantry_host
      POSTGRES_USER: recipes
      POSTGRES_PASSWORD: recipes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
