app = "feed-pantryhost"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3002"
  DB_PATH = "/data/registry.db"

[mounts]
  source = "feed_data"
  destination = "/data"

[[services]]
  internal_port = 3002
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[checks]
  [checks.health]
    type = "http"
    port = 3002
    path = "/health"
    interval = "30s"
    timeout = "5s"
