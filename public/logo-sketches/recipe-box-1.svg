    C68 20, 72 24, 76 24
    C80 24, 80 20, 80 16
    C80 12, 76 8, 72 8
    C68 8, 68 14, 68 18
    L68 30
    L52 30
    L52 18
    C52 14, 52 8, 48 8
    C44 8, 40 12, 40 16
    C40 20, 40 24, 44 24
    C48 24, 52 20, 52 16
